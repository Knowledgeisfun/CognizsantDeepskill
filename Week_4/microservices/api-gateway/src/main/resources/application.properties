# Server Configuration
server.port=8083

# Spring Application Identifier
spring.application.name=api-gateway

# =========================================================================
# Route 0: Account Microservice
# =========================================================================
spring.cloud.gateway.server.webflux.routes[0].id=account-service-route
spring.cloud.gateway.server.webflux.routes[0].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/accounts/**

# =========================================================================
# Route 1: Loan Microservice
# =========================================================================
spring.cloud.gateway.server.webflux.routes[1].id=loan-service-route
spring.cloud.gateway.server.webflux.routes[1].uri=lb://LOAN-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/loans/**

# =========================================================================
# Eureka Server Discovery Client Configuration
# =========================================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

logging.level.org.springframework.cloud.gateway=TRACE
logging.level.org.springframework.boot.context.properties.bind=DEBUG